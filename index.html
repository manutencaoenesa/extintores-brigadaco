<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inspeção de Extintores</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <style>
        .loader {
            border-top-color: #ef4444;
            animation: spinner 1.5s linear infinite;
        }
        @keyframes spinner {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body class="bg-gray-100 text-gray-800 font-sans min-h-screen">

    <header class="bg-red-600 text-white p-4 shadow-md flex justify-between items-center sticky top-0 z-10">
        <h1 class="text-xl font-bold flex items-center gap-2">
            <i class="ph ph-fire-extinguisher text-2xl"></i> Inspeção Mensal
        </h1>
        <button id="btnVoltar" class="hidden hover:bg-red-700 p-2 rounded flex items-center gap-1 transition" onclick="voltarParaDashboard()">
            <i class="ph ph-arrow-left"></i> Voltar
        </button>
    </header>

    <main class="container mx-auto p-4 max-w-3xl">
        
        <div id="loading" class="fixed inset-0 bg-white/80 z-50 flex flex-col items-center justify-center hidden">
            <div class="loader ease-linear rounded-full border-4 border-t-4 border-gray-200 h-16 w-16 mb-4"></div>
            <p id="loading-text" class="text-lg font-semibold text-gray-700">Processando...</p>
        </div>

        <section id="dashboardView">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-2xl font-semibold">Registros Recentes</h2>
                <button onclick="abrirFormulario()" class="bg-red-600 hover:bg-red-700 text-white font-bold py-2 px-4 rounded-lg shadow-md flex items-center gap-2 transition">
                    <i class="ph ph-plus-circle text-xl"></i> Novo Registro
                </button>
            </div>
            
            <div id="cardsContainer" class="grid grid-cols-1 md:grid-cols-2 gap-4">
                </div>
        </section>

        <section id="formView" class="hidden bg-white p-6 rounded-lg shadow-md">
            <h2 class="text-2xl font-semibold mb-4 border-b pb-2">Nova Inspeção</h2>
            
            <form id="inspecaoForm" onsubmit="enviarFormulario(event)">
                
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-6">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Nome do Inspetor</label>
                        <input type="text" id="nome" required class="w-full border-gray-300 rounded-md shadow-sm p-2 border focus:ring-red-500 focus:border-red-500">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Data</label>
                        <input type="date" id="data" required class="w-full border-gray-300 rounded-md shadow-sm p-2 border focus:ring-red-500 focus:border-red-500">
                    </div>
                    <div class="md:col-span-2">
                        <label class="block text-sm font-medium text-gray-700 mb-1">Número do Extintor</label>
                        <input type="number" id="numero" required placeholder="Ex: 15" class="w-full border-gray-300 rounded-md shadow-sm p-2 border focus:ring-red-500 focus:border-red-500">
                    </div>
                </div>

                <div class="bg-gray-50 p-4 rounded-md mb-6">
                    <p class="text-sm text-gray-500 mb-4"><i class="ph ph-info"></i> Selecione o status de cada item.</p>
                    
                    <div id="perguntasContainer" class="space-y-3">
                        </div>
                </div>

                <div class="mb-6">
                    <label class="block text-sm font-medium text-gray-700 mb-1">Observações (Obrigatório se houver reprovação)</label>
                    <textarea id="observacoes" rows="3" class="w-full border-gray-300 rounded-md shadow-sm p-2 border focus:ring-red-500 focus:border-red-500" placeholder="Se algum item foi reprovado (X), descreva o que houve..."></textarea>
                </div>

                <button type="submit" class="w-full bg-red-600 hover:bg-red-700 text-white font-bold py-3 px-4 rounded-lg shadow-md transition text-lg">
                    Enviar Inspeção e Gerar Relatório
                </button>
            </form>
        </section>

    </main>

    <script>
        // ==========================================
        // COLE SUA URL DO APPS SCRIPT AQUI ABAIXO
        // ==========================================
        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxXFLU76oQuWCLgcLWSki0u9qQZuHNxWDljmXcx0w6HyWHW1TEHhTFut4ebZxoqf3HFwQ/exec';

        const perguntas = [
            "1. Rótulo e selo do (INMETRO) legíveis",
            "2. Validade da recarga e teste hidrostático",
            "3. Ponteiro do manômetro na demarcação verde",
            "4. Lacre",
            "5. Pino (trava) de segurança",
            "6. Condições do mangote (mangueira)",
            "7. Condições da válvula (gatilho)",
            "8. Informações na ficha do extintor",
            "9. Apresentação, limpeza, pintura",
            "10. Verificar se está obstruído",
            "11. Sinalização",
            "12. Suporte"
        ];

        // Inicialização
        document.addEventListener('DOMContentLoaded', () => {
            renderizarPerguntas();
            carregarRegistros();
        });

        function renderizarPerguntas() {
            const container = document.getElementById('perguntasContainer');
            perguntas.forEach((pergunta, index) => {
                const num = index + 1;
                container.innerHTML += `
                    <div class="flex flex-col sm:flex-row sm:items-center justify-between bg-white p-3 rounded shadow-sm border">
                        <span class="text-sm font-medium mb-2 sm:mb-0 w-full sm:w-2/3">${pergunta}</span>
                        <select id="item${num}" class="w-full sm:w-1/3 border-gray-300 rounded p-1 border text-sm" required>
                            <option value="OK">OK (Aprovado)</option>
                            <option value="X">X (Reprovado)</option>
                            <option value="N/A">N/A</option>
                        </select>
                    </div>
                `;
            });
        }

        // Navegação de Telas
        function abrirFormulario() {
            document.getElementById('dashboardView').classList.add('hidden');
            document.getElementById('formView').classList.remove('hidden');
            document.getElementById('btnVoltar').classList.remove('hidden');
            document.getElementById('inspecaoForm').reset();
            document.getElementById('data').valueAsDate = new Date();
        }

        function voltarParaDashboard() {
            document.getElementById('formView').classList.add('hidden');
            document.getElementById('dashboardView').classList.remove('hidden');
            document.getElementById('btnVoltar').classList.add('hidden');
        }

        function setLoading(isLoading, text = 'Processando...') {
            const loader = document.getElementById('loading');
            document.getElementById('loading-text').innerText = text;
            if (isLoading) loader.classList.remove('hidden');
            else loader.classList.add('hidden');
        }

        // Fetch de Registros
        async function carregarRegistros() {
            setLoading(true, 'Carregando painel...');
            const container = document.getElementById('cardsContainer');
            
            try {
                const response = await fetch(SCRIPT_URL);
                const data = await response.json();
                
                container.innerHTML = '';
                if(data.length === 0) {
                    container.innerHTML = `<p class="text-gray-500 col-span-2 text-center py-6">Nenhum registro encontrado.</p>`;
                } else {
                    data.forEach(reg => {
                        container.innerHTML += `
                            <div class="bg-white p-4 rounded-lg shadow-sm border border-gray-200 flex flex-col justify-between">
                                <div>
                                    <div class="flex justify-between items-start mb-2">
                                        <h3 class="font-bold text-lg text-gray-800">Extintor Nº ${reg.numero}</h3>
                                        <span class="text-xs bg-gray-100 text-gray-600 px-2 py-1 rounded-full"><i class="ph ph-calendar"></i> ${reg.data}</span>
                                    </div>
                                    <p class="text-sm text-gray-600 mb-4"><i class="ph ph-user"></i> ${reg.nome}</p>
                                </div>
                                <a href="${reg.link}" target="_blank" class="text-center bg-gray-100 hover:bg-gray-200 text-gray-800 text-sm font-semibold py-2 px-4 rounded transition flex justify-center items-center gap-2">
                                    <i class="ph ph-file-pdf text-red-600"></i> Ver Relatório
                                </a>
                            </div>
                        `;
                    });
                }
            } catch (error) {
                container.innerHTML = `<p class="text-red-500 col-span-2 text-center py-6">Erro ao carregar dados. Verifique a URL do App Script.</p>`;
            } finally {
                setLoading(false);
            }
        }

        // Submissão do Formulário
        async function enviarFormulario(event) {
            event.preventDefault();
            
            // Validação simples para observações se houver reprovação
            const observacoes = document.getElementById('observacoes').value;
            let temReprovacao = false;
            for(let i=1; i<=12; i++){
                if(document.getElementById(`item${i}`).value === 'X') temReprovacao = true;
            }
            if(temReprovacao && observacoes.trim() === '') {
                alert('Você marcou um item como Reprovado (X). É obrigatório preencher o campo de Observações com o número do item e o que houve.');
                return;
            }

            setLoading(true, 'Gerando relatório e salvando no Drive...');

            const payload = {
                nome: document.getElementById('nome').value,
                data: document.getElementById('data').value,
                numero: document.getElementById('numero').value,
                observacoes: observacoes,
                item1: document.getElementById('item1').value,
                item2: document.getElementById('item2').value,
                item3: document.getElementById('item3').value,
                item4: document.getElementById('item4').value,
                item5: document.getElementById('item5').value,
                item6: document.getElementById('item6').value,
                item7: document.getElementById('item7').value,
                item8: document.getElementById('item8').value,
                item9: document.getElementById('item9').value,
                item10: document.getElementById('item10').value,
                item11: document.getElementById('item11').value,
                item12: document.getElementById('item12').value
            };

            try {
                // Modo no-cors é evitado aqui usando stringificação simples e permitindo que o Apps Script responda
                const response = await fetch(SCRIPT_URL, {
                    method: 'POST',
                    body: JSON.stringify(payload)
                });
                
                const result = await response.json();
                
                if (result.status === "success") {
                    alert('Inspeção registrada com sucesso! O relatório foi gerado.');
                    voltarParaDashboard();
                    carregarRegistros(); // Atualiza a tela inicial
                } else {
                    alert('Erro ao salvar: ' + result.message);
                }
            } catch (error) {
                // Em alguns casos de CORS bloqueado no retorno, o fetch cai no catch, mas o script executa.
                alert('Os dados foram enviados. A tela será atualizada para confirmar se o relatório foi gerado.');
                voltarParaDashboard();
                carregarRegistros();
            } finally {
                setLoading(false);
            }
        }
    </script>
</body>
</html>
